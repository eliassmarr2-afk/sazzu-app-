name: Deploy send-tracking-email

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Function
        env:
          DEPLOY_TOKEN: ${{ secrets.SUPABASE_DEPLOY_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -z "$DEPLOY_TOKEN" ]; then
            echo "Missing GitHub secret: SUPABASE_DEPLOY_TOKEN"
            exit 1
          fi

          if [ -z "$PROJECT_REF" ]; then
            echo "Missing GitHub secret: SUPABASE_PROJECT_REF"
            exit 1
          fi

          SUPABASE_ACCESS_TOKEN="$DEPLOY_TOKEN" supabase functions deploy send-tracking-email --project-ref "$PROJECT_REF"
