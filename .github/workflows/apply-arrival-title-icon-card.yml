name: Apply arrival title icon card

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/apply-arrival-title-icon-card.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update arrival sheet title icon style
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('sections/product-information.liquid')
          text = path.read_text()

          old_icon = """#AlPasoProductTop-{{ section.id }} .alpaso-arrival-sheet__title-icon {
  width: 23px;
  height: 23px;
  flex: 0 0 auto;
  color: #2479FF;
  display: inline-block;
}"""

          new_icon = """#AlPasoProductTop-{{ section.id }} .alpaso-arrival-sheet__title-icon {
  width: 34px;
  height: 34px;
  flex: 0 0 34px;
  color: #2479FF;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: #F3F7FF;
  border: 1px solid rgba(36, 121, 255, 0.18);
  border-radius: 5px;
  box-shadow: 0 6px 16px rgba(36, 121, 255, 0.10);
}"""

          old_svg = """#AlPasoProductTop-{{ section.id }} .alpaso-arrival-sheet__title-icon svg {
  width: 100%;
  height: 100%;
  display: block;
}"""

          new_svg = """#AlPasoProductTop-{{ section.id }} .alpaso-arrival-sheet__title-icon svg {
  width: 20px;
  height: 20px;
  display: block;
}"""

          if new_icon not in text:
            if old_icon not in text:
              raise SystemExit('No se encontró el bloque CSS del icono del título del slide.')
            text = text.replace(old_icon, new_icon)

          if new_svg not in text:
            if old_svg not in text:
              raise SystemExit('No se encontró el bloque CSS del SVG del icono del título del slide.')
            text = text.replace(old_svg, new_svg)

          path.write_text(text)
          PY

      - name: Commit arrival title icon card
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sections/product-information.liquid
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Style arrival sheet title icon as card"
            git push
          fi
