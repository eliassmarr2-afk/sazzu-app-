name: Unpack Shopify theme export

on:
  push:
    branches:
      - main
    paths:
      - '_theme_upload/*.zip'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find uploaded theme ZIP
        id: theme_zip
        shell: bash
        run: |
          ZIP_FILE="$(ls -t _theme_upload/*.zip 2>/dev/null | head -n 1 || true)"
          if [ -z "$ZIP_FILE" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No ZIP file found in _theme_upload. Nothing to unpack."
            exit 0
          fi
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "file=$ZIP_FILE" >> "$GITHUB_OUTPUT"
          echo "Using ZIP: $ZIP_FILE"

      - name: Unpack Shopify theme into repository root
        if: steps.theme_zip.outputs.found == 'true'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf assets blocks config layout locales sections snippets templates .theme-unpack
          mkdir -p .theme-unpack
          unzip -q "${{ steps.theme_zip.outputs.file }}" -d .theme-unpack

          for dir in assets blocks config layout locales sections snippets templates; do
            if [ -d ".theme-unpack/$dir" ]; then
              mv ".theme-unpack/$dir" "$dir"
            fi
          done

          test -f layout/theme.liquid
          test -f config/settings_schema.json

          rm -rf .theme-unpack _theme_upload

      - name: Commit unpacked theme
        if: steps.theme_zip.outputs.found == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Unpack current Shopify theme export"
            git push
          fi
