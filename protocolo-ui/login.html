<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Protocol Data - Iniciar sesion</title>

  <link rel="stylesheet" href="login.css">

  <!-- Fuente -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

    <div class="container">

        <!-- LOGIN (AHORA IZQUIERDA) -->
        <div class="left-panel">
      
            <img src="./assets/logo.png" class="logo">


          <div class="login-box">
      
            <h2>Inicia sesión en Protocol Data</h2>
      
            <button class="google-btn">
              <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google">
              Acceder con Google
            </button>
      
            <div class="divider">
              <span>o</span>
            </div>
      
            <input type="text" placeholder="Correo electrónico">
            <input type="password" placeholder="Contraseña">
      
            <button class="login-btn">
              Ingresar
            </button>
            <a href="#" class="forgot">Olvidé mi contraseña</a>

<button class="create-account">
  Crear cuenta
</button>

<a href="#" class="what-is">
  ¿Qué es Protocol Data?
</a>

      
          </div>
      
        </div>
      
        <!-- BANNER (DERECHA) -->
        <div class="right-panel">
      
            <div class="banner-content">

                <h1 id="typed-text"></h1>
              
                <div class="shapes-scene">
              
                  <!-- FORMAS -->
                  <div class="shape circle"></div>
                  <div class="shape square"></div>
                  <div class="shape triangle"></div>
                  <div class="shape pentagon"></div>
                  <div class="shape hexagon"></div>
              
                  <!-- LINEAS -->
                  <div class="line l1"></div>
                  <div class="line l2"></div>
                  <div class="line l3"></div>
                  <!-- FLUJO -->
<div class="flow flow1"></div>
<div class="flow flow2"></div>
<div class="flow flow3"></div>

              
                </div>
              
              </div>
              
              
              
      
        </div>
      
      </div>
      
      <script src="login.js"></script>

</body>
</html>
