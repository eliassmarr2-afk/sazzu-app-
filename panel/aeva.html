<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="view-transition" content="same-origin" />

  <title>AEVA · Protocol Data</title>

  <!-- INICIO · CSS base del sistema -->
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/panel.css" />
  <link rel="stylesheet" href="/css/sidebar.css" />
  <link rel="stylesheet" href="/css/style.css" />
  <!-- FIN · CSS base del sistema -->

  <!-- INICIO · CSS propio AEVA -->
  <link rel="stylesheet" href="/css/aeva.css" />
  <!-- FIN · CSS propio AEVA -->
</head>

<body data-page="aeva">
  <div class="appShell">
    <div class="bodyGrid">

      <!-- INICIO · Sidebar oficial cargado por app.js -->
      <aside class="sidebar" data-include="sidebar" aria-label="Navegación"></aside>
      <!-- FIN · Sidebar oficial cargado por app.js -->

      <!-- INICIO · Panel AEVA minimal -->
<main class="main aevaMain" aria-label="Panel AEVA">
    <section class="aevaStage" data-aeva-panel>
  
            <!-- INICIO · Mensajes fuera del prompt -->
            <div class="aevaConversationStage">
                <div class="aevaConversationRail" data-aeva-thread hidden></div>
              </div>
              <!-- FIN · Mensajes fuera del prompt -->
        
              <!-- INICIO · AEVA · Entrada inicial ordenada -->
<div class="aevaEntryLayer" data-aeva-entry aria-label="Inicio de AEVA">
    <section class="aevaIntro" data-aeva-intro>
      <h1 class="aevaIntro__title">¿En qué módulo puedo ayudarte hoy?</h1>
    </section>
  
    <section class="aevaQuickPrompts" data-aeva-quick-prompts aria-label="Preguntas rápidas">
      <button
        type="button"
        class="aevaQuickPrompts__item"
        data-aeva-quick-message="¿Cómo creo una audiencia personalizada?"
      >
        <span class="aevaQuickPrompts__icon aevaQuickPrompts__icon--blue" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M12 4.75a3.25 3.25 0 1 0 0 6.5 3.25 3.25 0 0 0 0-6.5Zm-6.75 13c0-2.9 3.18-4.75 6.75-4.75s6.75 1.85 6.75 4.75V19H5.25v-1.25Z"></path>
          </svg>
        </span>
  
        <span class="aevaQuickPrompts__copy">
          <strong>¿Cómo creo una audiencia personalizada?</strong>
          <small>Guía paso a paso dentro de Protocol Data</small>
        </span>
      </button>
  
      <button
        type="button"
        class="aevaQuickPrompts__item"
        data-aeva-quick-message="¿Cómo agrego un producto al stock?"
      >
        <span class="aevaQuickPrompts__icon aevaQuickPrompts__icon--violet" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M7 5.25h10A1.75 1.75 0 0 1 18.75 7v10A1.75 1.75 0 0 1 17 18.75H7A1.75 1.75 0 0 1 5.25 17V7A1.75 1.75 0 0 1 7 5.25Zm4.25 3v2.5h-2.5v1.5h2.5v2.5h1.5v-2.5h2.5v-1.5h-2.5v-2.5h-1.5Z"></path>
          </svg>
        </span>
  
        <span class="aevaQuickPrompts__copy">
          <strong>¿Cómo agrego un producto al stock?</strong>
          <small>Carga de producto y lectura operativa</small>
        </span>
      </button>
    </section>
  </div>
  <!-- FIN · AEVA · Entrada inicial ordenada -->
          
              <!-- INICIO · Prompt fijo inferior -->
              <div class="aevaPromptDock">
        <div class="aevaPromptWrap">
  
          <form class="aevaBox" data-aeva-form autocomplete="off">
            <!-- INICIO · Input -->
            <textarea
              class="aevaBox__textarea"
              data-aeva-input
              rows="1"
              placeholder="Type your message here..."
              aria-label="Mensaje para AEVA"
            ></textarea>
            <!-- FIN · Input -->
  
            <!-- INICIO · Acciones -->
            <div class="aevaBox__actions">
              <div class="aevaBox__left">
                <button
                  type="button"
                  class="aevaBox__iconBtn"
                  data-aeva-action="attach"
                  aria-label="Adjuntar archivo"
                  title="Adjuntar"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M8.5 12.5 13.9 7.1a3 3 0 0 1 4.24 4.24l-6.72 6.72a5 5 0 0 1-7.07-7.07l7.43-7.43" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"></path>
                  </svg>
                </button>
  
                <button
                  type="button"
                  class="aevaBox__iconBtn aevaBox__mode"
                  data-aeva-mode="datos"
                  aria-label="Buscar en datos"
                  title="Buscar en datos"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18Z" fill="none" stroke="currentColor" stroke-width="1.8"></path>
                    <path d="M3.6 9h16.8M3.6 15h16.8M12 3c2.1 2.3 3.15 5.3 3.15 9S14.1 18.7 12 21M12 3C9.9 5.3 8.85 8.3 8.85 12S9.9 18.7 12 21" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                  </svg>
                </button>
  
                <span class="aevaBox__divider" aria-hidden="true"></span>
  
                <button
                  type="button"
                  class="aevaBox__iconBtn aevaBox__mode is-active"
                  data-aeva-mode="analizar"
                  aria-label="Analizar"
                  title="Analizar"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 3.75 14.15 9l5.6.45-4.25 3.65 1.3 5.45L12 15.65 7.2 18.55l1.3-5.45-4.25-3.65L9.85 9 12 3.75Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"></path>
                  </svg>
                </button>
  
                <span class="aevaBox__divider" aria-hidden="true"></span>
  
                <button
                  type="button"
                  class="aevaBox__iconBtn aevaBox__mode"
                  data-aeva-mode="guia"
                  aria-label="Crear guía"
                  title="Crear guía"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M6.5 4.75h8.25L18.5 8.5v10.75H6.5V4.75Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"></path>
                    <path d="M14.75 4.75V8.5h3.75M8.75 12h6.5M8.75 15h6.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                  </svg>
                </button>
              </div>
  
              <button
              type="button"
              class="aevaBox__mainAction"
              data-aeva-main-action
              data-aeva-send
              aria-label="Hablar con AEVA"
              title="Hablar con AEVA"
            >
                <svg class="aevaBox__mainIcon aevaBox__mainIcon--mic" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 14.5a3 3 0 0 0 3-3V6.75a3 3 0 0 0-6 0v4.75a3 3 0 0 0 3 3Z" fill="none" stroke="currentColor" stroke-width="1.9"></path>
                  <path d="M18.25 11.5a6.25 6.25 0 0 1-12.5 0M12 17.75V21M9.5 21h5" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"></path>
                </svg>
  
                <svg class="aevaBox__mainIcon aevaBox__mainIcon--send" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 19V5M12 5 6.75 10.25M12 5l5.25 5.25" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
              </button>
            </div>
            <!-- FIN · Acciones -->
          </form>
  
        </div>
      </div>
      <!-- FIN · Prompt fijo inferior -->
  
    </section>
  </main>
  <!-- FIN · Panel AEVA minimal -->

    </div>
  </div>

  <!-- INICIO · JS base del sistema -->
  <script src="/js/app.js"></script>
  <!-- FIN · JS base del sistema -->

  <!-- INICIO · JS propio AEVA -->
  <script src="/js/aeva.js"></script>
  <!-- FIN · JS propio AEVA -->
</body>
</html>
